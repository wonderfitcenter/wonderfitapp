// FIREBASE — Synchronisation multi-appareils
// ============================================================
(function() {
  // Config Firebase WonderFit Center
  const FB_CONFIG = {
    apiKey: "AIzaSyDRTtvlbA46VwB4C-59qF2JlXzwClG-ZME",
    authDomain: "wonderfit-center.firebaseapp.com",
    projectId: "wonderfit-center",
    storageBucket: "wonderfit-center.firebasestorage.app",
    messagingSenderId: "842125002153",
    appId: "1:842125002153:web:5165043bdcc40800fa70b8"
  };

  // Charger Firebase dynamiquement
  const loadFirebase = () => {
    return new Promise((resolve) => {
      const s1 = document.createElement('script');
      s1.src = 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js';
      s1.onload = () => {
        const s2 = document.createElement('script');
        s2.src = 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js';
        s2.onload = () => resolve(true);
        s2.onerror = () => resolve(false);
        document.head.appendChild(s2);
      };
      s1.onerror = () => resolve(false);
      document.head.appendChild(s1);
    });
  };

  const SYNC_KEYS = ['clients','subs','pays','apts','sessions','nutri','progress',
    'msgs','objectifs','badges','caisse','waitlist','bilans','charges',
    'inscriptions','essais','parrainages'];

  let db = null;
  let syncEnabled = false;
  let _lastPush = 0;

  // Afficher indicateur de sync
  const showSyncStatus = (status) => {
    let indicator = document.getElementById('wf-sync');
    if (!indicator) {
      indicator = document.createElement('div');
      indicator.id = 'wf-sync';
      indicator.style.cssText = 'position:fixed;bottom:calc(var(--nav,60px) + var(--safe-b,0px) + 8px);right:10px;font-size:.65rem;padding:3px 8px;border-radius:10px;z-index:9000;pointer-events:none;transition:opacity .3s;font-weight:600';
      document.body.appendChild(indicator);
    }
    const configs = {
      syncing: {bg:'#FFF0E6', color:'#FA6F0A', text:'⟳ Sync...'},
      synced:  {bg:'#E6F5EF', color:'#1E8A5E', text:'✓ Synchronisé'},
      offline: {bg:'#F2EEEB', color:'#9E9590', text:'📴 Hors ligne'},
      error:   {bg:'#FDECEA', color:'#D63031', text:'⚠ Erreur sync'},
    };
    const cfg = configs[status] || configs.offline;
    indicator.style.background = cfg.bg;
    indicator.style.color = cfg.color;
    indicator.textContent = cfg.text;
    indicator.style.opacity = '1';
    if (status === 'synced') setTimeout(() => { indicator.style.opacity = '0'; }, 3000);
  };

  // Sauvegarder toutes les données sur Firestore
  const pushToFirebase = async () => {
    if (!db || !syncEnabled) return;
    const now = Date.now();
    if (now - _lastPush < 2000) return; // throttle 2s
    _lastPush = now;
    try {
      showSyncStatus('syncing');
      const data = {};
      SYNC_KEYS.forEach(k => { if (ST[k] !== undefined) data[k] = ST[k]; });
      data.blockedDays = ST.blockedDays || [];
      data.users_hash = JSON.stringify(USERS);
      data.updated_at = new Date().toISOString();
      await db.collection('wonderfit').doc('data').set(data);
      showSyncStatus('synced');
    } catch(e) {
      console.warn('[WF Firebase] Push error:', e.message);
      showSyncStatus('error');
    }
  };

  // Charger les données depuis Firestore
  const pullFromFirebase = async () => {
    if (!db) return false;
    try {
      showSyncStatus('syncing');
      const doc = await db.collection('wonderfit').doc('data').get();
      if (!doc.exists) {
        // Première utilisation — pousser les données locales
        await pushToFirebase();
        return false;
      }
      const data = doc.data();
      SYNC_KEYS.forEach(k => {
        if (data[k] !== undefined) {
          ST[k] = data[k];
          SS(k, data[k]);
        }
      });
      if (data.blockedDays) {
        ST.blockedDays = data.blockedDays;
        SS('blockedDays', data.blockedDays);
      }
      showSyncStatus('synced');
      return true;
    } catch(e) {
      console.warn('[WF Firebase] Pull error:', e.message);
      showSyncStatus('offline');
      return false;
    }
  };

  // Écouter les changements en temps réel
  const listenRealtime = () => {
    if (!db) return;
    db.collection('wonderfit').doc('data').onSnapshot((doc) => {
      if (!doc.exists) return;
      const data = doc.data();
      // Ne pas appliquer si c'est notre propre push (updated_at récent)
      if (data.updated_at && (Date.now() - new Date(data.updated_at).getTime()) < 3000) return;
      SYNC_KEYS.forEach(k => {
        if (data[k] !== undefined) { ST[k] = data[k]; SS(k, data[k]); }
      });
      if (data.blockedDays) { ST.blockedDays = data.blockedDays; SS('blockedDays', data.blockedDays); }
      showSyncStatus('synced');
      // Rafraîchir l'affichage si possible
      if (typeof renderAdminPage === 'function' && ST.user?.role !== 'cliente') {
        try { renderAdminPage(); } catch(e) {}
      }
    }, (e) => {
      console.warn('[WF Firebase] Listen error:', e.message);
      showSyncStatus('offline');
    });
  };

  // Surcharger persist pour pousser vers Firebase
  const _origPersistFB = window.persist;
  window.persist = function() {
    if (_origPersistFB) _origPersistFB();
    if (syncEnabled) pushToFirebase();
  };

  // Init Firebase
  window._initFirebase = async () => {
    const loaded = await loadFirebase();
    if (!loaded) { showSyncStatus('offline'); return; }
    try {
      if (!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
      db = firebase.firestore();
      
      syncEnabled = true;
      console.log('[WF Firebase] Connected ✓');

      // Charger données depuis Firebase au démarrage
      const pulled = await pullFromFirebase();
      if (pulled) {
        // Rafraîchir l'app avec les données Firebase
        if (ST.user) render();
      }

      // Écouter les changements en temps réel
      listenRealtime();

    } catch(e) {
      console.warn('[WF Firebase] Init error:', e.message);
      showSyncStatus('offline');
    }
  };

  // Démarrer après le chargement de la page
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(window._initFirebase, 1500));
  } else {
    setTimeout(window._initFirebase, 1500);
  }

})();

// ============================================================
// BOOT
// ============================================================
// Boot — ensure DOM is ready
if(document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() { render(); });
} else {
  render();
}
</script>

window.addEventListener('beforeinstallprompt', e => {

      <div class="ig-num">2</div>
      <div class="ig-body">
        <div class="ig-title">Appuyez sur les <strong>3 points ⋮</strong></div>
        <div class="ig-desc">En haut à droite de Chrome.</div>
        <div class="ig-icon-demo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#FA6F0A"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
        </div>
      </div>
    </div>
    <div class="ig-step">
      <div class="ig-num">3</div>
      <div class="ig-body">
        <div class="ig-title">Appuyez sur <strong>"Ajouter à l'écran d'accueil"</strong></div>
        <div class="ig-desc">Ou si une bannière d'installation est apparue en bas → appuyez sur "Installer".</div>
      </div>
    </div>
    <div class="ig-step">
      <div class="ig-num">4</div>
      <div class="ig-body">
        <div class="ig-title">Confirmez en appuyant sur <strong>"Ajouter"</strong></div>
        <div class="ig-desc">L'icône WonderFit orange apparaît sur votre écran d'accueil !</div>
      </div>
    </div>`;

  const general_steps = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <button onclick="document.getElementById('wf-install-guide').remove();showInstallGuide('ios')"
        style="padding:14px 10px;background:#FAF7F5;border:2px solid #FA6F0A;border-radius:12px;cursor:pointer;font-family:var(--fb);text-align:center">
        <div style="font-size:1.6rem;margin-bottom:4px"></div>
        <div style="font-weight:700;font-size:.86rem">iPhone / iPad</div>
        <div style="font-size:.72rem;color:#5C5652;margin-top:2px">Safari</div>
      </button>
      <button onclick="document.getElementById('wf-install-guide').remove();showInstallGuide('android')"
        style="padding:14px 10px;background:#FAF7F5;border:2px solid #FA6F0A;border-radius:12px;cursor:pointer;font-family:var(--fb);text-align:center">
        <div style="font-size:1.6rem;margin-bottom:4px">🤖</div>
        <div style="font-weight:700;font-size:.86rem">Android</div>
        <div style="font-size:.72rem;color:#5C5652;margin-top:2px">Chrome</div>
      </button>
    </div>`;

  overlay.innerHTML = `
  <div style="background:var(--card,#fff);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:0 0 calc(var(--safe-b,0px) + 20px)">
    <!-- Handle -->
    <div style="display:flex;justify-content:center;padding:12px 0 4px">
      <div style="width:40px;height:4px;background:#E8E2DD;border-radius:10px"></div>
    </div>
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 20px 16px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:42px;height:42px;background:#FA6F0A;border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(250,111,10,.3)">
          <svg width="24" height="26" viewBox="0 0 100 110" fill="none"><path d="M50 5L88 28L88 72L50 95L12 72L12 28Z" stroke="white" stroke-width="5" fill="none" stroke-linejoin="round"/><path d="M50 18L78 68L22 68Z" fill="white"/><path d="M28 68L50 88L72 68Z" fill="rgba(255,255,255,.45)"/></svg>
        </div>
        <div>
          <div style="font-weight:700;font-size:1rem;color:var(--tx,#0F0E0E)">Installer WonderFit</div>
          <div style="font-size:.72rem;color:#9E9590;margin-top:1px">${p === 'ios' ? '📱 iPhone · iPad · Mac' : p === 'android' ? '🤖 Android' : '📲 Choisir votre téléphone'}</div>
        </div>
      </div>
      <button onclick="document.getElementById('wf-install-guide').remove();localStorage.setItem('wf_install_dismissed','1')"
        style="background:var(--bg2,#F2EEEB);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:#9E9590;flex-shrink:0">✕</button>
    </div>

    <!-- Avantages -->
    <div style="display:flex;gap:0;margin:0 20px 16px;background:var(--bg2,#F2EEEB);border-radius:12px;overflow:hidden">
      ${[['📴','Hors ligne'],['⚡','Rapide'],['🔔','Rappels'],['📲','Icône']].map(([i,l])=>`
      <div style="flex:1;text-align:center;padding:10px 4px">
        <div style="font-size:1.1rem;margin-bottom:2px">${i}</div>
        <div style="font-size:.64rem;color:#5C5652;font-weight:600">${l}</div>
      </div>`).join('')}
    </div>

    <!-- Steps -->
    <div style="padding:0 20px">
      <style>
        .ig-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
        .ig-num{width:28px;height:28px;background:#FA6F0A;color:#fff;border-radius:8px;font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
        .ig-body{flex:1;min-width:0}
        .ig-title{font-size:.88rem;margin-bottom:3px;color:var(--tx,#0F0E0E);line-height:1.4}
        .ig-desc{font-size:.76rem;color:#5C5652;line-height:1.5}
        .ig-tag{font-size:.72rem;color:#1E8A5E;font-weight:600;margin-top:4px;background:#E6F5EF;padding:3px 8px;border-radius:6px;display:inline-block}
        .ig-icon-demo{display:flex;align-items:center;gap:8px;margin-top:6px;background:var(--bg2,#F2EEEB);padding:8px 12px;border-radius:8px;width:fit-content}
      </style>

      ${p === 'general' ? general_steps : p === 'ios' ? ios_steps : android_steps}

      ${p !== 'general' ? `
      <!-- Switch platform -->
      <div style="text-align:center;margin-top:6px;margin-bottom:4px">
        <button onclick="document.getElementById('wf-install-guide').remove();showInstallGuide('${p==='ios'?'android':'ios'}')"
          style="background:none;border:none;color:#9E9590;font-size:.76rem;cursor:pointer;text-decoration:underline">
          ${p === 'ios' ? '🤖 Vous avez un Android ?' : '📱 Vous avez un iPhone ?'}
        </button>
      </div>

      <!-- Android: trigger native prompt -->
      ${p === 'android' && _deferredInstallPrompt ? `
      <button onclick="triggerInstall()" style="width:100%;padding:14px;background:#FA6F0A;color:#fff;border:none;border-radius:12px;font-weight:700;font-size:.9rem;cursor:pointer;font-family:var(--fb);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Installer maintenant
      </button>` : ''}` : ''}
    </div>
  </div>`;

  // Close on overlay click
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.remove();
    }
  });

  document.body.appendChild(overlay);
};

// ── Bannière discrète au bas de l'écran ─────────────────────
function showInstallBanner() {
  if (isStandaloneMode()) return;
  if (localStorage.getItem('wf_install_dismissed')) return;
  // Don't show if already shown recently
  const lastShown = localStorage.getItem('wf_install_last_shown');
  if (lastShown && Date.now() - parseInt(lastShown) < 86400000) return; // 24h cooldown

  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = [
    'position:fixed',
    'bottom:calc(var(--nav,60px) + var(--safe-b,0px) + 10px)',
    'left:12px',
    'right:12px',
    'background:var(--card,#fff)',
    'border:1.5px solid #FA6F0A',
    'border-radius:16px',
    'padding:12px 14px',
    'z-index:9998',
    'display:flex',
    'align-items:center',
    'gap:12px',
    'box-shadow:0 8px 28px rgba(0,0,0,.18)',
    'animation:slide-up .3s ease',
  ].join(';');

  banner.innerHTML = `
  <style>@keyframes slide-up{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}</style>
  <div style="width:40px;height:40px;background:#FA6F0A;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
    <svg width="22" height="24" viewBox="0 0 100 110" fill="none"><path d="M50 5L88 28L88 72L50 95L12 72L12 28Z" stroke="white" stroke-width="5" fill="none" stroke-linejoin="round"/><path d="M50 18L78 68L22 68Z" fill="white"/><path d="M28 68L50 88L72 68Z" fill="rgba(255,255,255,.45)"/></svg>
  </div>
  <div style="flex:1;min-width:0">
    <div style="font-weight:700;font-size:.86rem;color:var(--tx,#0F0E0E)">Installer l'app WonderFit</div>
    <div style="font-size:.72rem;color:#9E9590;margin-top:1px">Accès rapide · Hors ligne · Rappels</div>
  </div>
  <button onclick="showInstallGuide()" style="background:#FA6F0A;color:#fff;border:none;border-radius:9px;padding:8px 14px;font-weight:700;font-size:.78rem;cursor:pointer;font-family:var(--fb);flex-shrink:0;white-space:nowrap">Installer</button>
  <button onclick="dismissInstall()" style="background:none;border:none;color:#9E9590;font-size:1.1rem;cursor:pointer;padding:4px;flex-shrink:0;line-height:1">✕</button>`;

  document.body.appendChild(banner);
  localStorage.setItem('wf_install_last_shown', Date.now().toString());

  // Auto-dismiss after 8s
  setTimeout(() => { if (banner.parentNode) banner.remove(); }, 8000);
}

// ── Bouton "Installer" dans le profil cliente ────────────────
window.showInstallGuideFromProfile = () => showInstallGuide();

// ── Déclenchement ────────────────────────────────────────────
window.addEventListener('load', () => {
  if (isStandaloneMode()) return;

  // iOS Safari: guide immédiat si première visite
  if (isSafariIOS() && !localStorage.getItem('wf_install_dismissed')) {
    setTimeout(() => showInstallGuide('ios'), 4000);
    return;
  }

  // Android Chrome: bannière discrète
  if (isAndroid() && isChrome()) {
    setTimeout(showInstallBanner, 3000);
    return;
  }

  // Other (desktop, unknown): bannière discrète
  setTimeout(showInstallBanner, 5000);
});

// Android native prompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  if (!isStandaloneMode()) setTimeout(showInstallBanner, 2000);
});

window.addEventListener('appinstalled', () => {
  localStorage.setItem('wf_install_dismissed', '1');
  const b = document.getElementById('install-banner');
  if (b) b.remove();
  const g = document.getElementById('wf-install-guide');
  if (g) g.remove();
});
</script>
</body>
</html>
